<mat-toolbar class="header-toolbar">
  <div class="header-left">
    <button
      mat-icon-button
      aria-label="Feedback an Entwickler senden"
      matTooltip="Feedback an Entwickler"
      matTooltipPosition="below"
      (click)="openDevFeedbackDialog()"
    >
      <mat-icon>build_circle</mat-icon>
    </button>
    <span class="dev-badge">Alpha</span>
  </div>

  <a routerLink="/" (click)="onClickHero()">
    <div class="header-center">
      <img [src]="logoSrc()" alt="Foodieflip-Logo" class="header-logo" />
    </div>
  </a>

  <!-- Include Material Badge on header icon whenever logged in, then edit aria-label and edit menu options below depending on login state -->
  <div class="header-right">
    <button mat-icon-button aria-label="In Nutzerkonto einloggen" [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item><mat-icon>login</mat-icon> <span>Login mit Google</span></button>
    </mat-menu>
    <button mat-icon-button aria-label="Design wechseln" (click)="toggleTheme()">
      <mat-icon>{{ themeIcon() }}</mat-icon>
    </button>
  </div>
</mat-toolbar>

<mat-toolbar class="header-toolbar">
  <div class="header-left">
    <button
      mat-icon-button
      aria-label="Feedback an Entwickler senden"
      matTooltip="Feedback an Entwickler"
      matTooltipPosition="below"
      (click)="openDevFeedbackDialog()"
    >
      <mat-icon>build_circle</mat-icon>
    </button>
    <span class="dev-badge">Alpha</span>
  </div>

  <a routerLink="/" (click)="onClickHero()">
    <div class="header-center">
      <img [src]="logoSrc()" alt="Foodieflip-Logo" class="header-logo" />
    </div>
  </a>

  <div class="header-right">
    <button mat-icon-button aria-label="Design wechseln" (click)="toggleTheme()">
      <mat-icon>{{ themeIcon() }}</mat-icon>
    </button>
  </div>
</mat-toolbar>

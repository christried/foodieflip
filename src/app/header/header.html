<mat-toolbar class="header-toolbar">
  <div class="header-left">
    <button
      mat-icon-button
      aria-label="Provide feedback to the developer"
      matTooltip="Send feedback to the developer"
      matTooltipPosition="below"
      (click)="openDevFeedbackDialog()"
    >
      <mat-icon>build_circle</mat-icon>
    </button>
    <span class="dev-badge">in early development</span>
  </div>

  <div class="header-center">
    <img [src]="logoSrc()" alt="Foodieflip logo" class="header-logo" />
  </div>

  <div class="header-right">
    <button mat-icon-button aria-label="Toggle theme" (click)="toggleTheme()">
      <mat-icon>{{ themeIcon() }}</mat-icon>
    </button>
  </div>
</mat-toolbar>

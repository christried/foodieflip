<div class="actions-section">
  <div class="voting-div">
    <div class="cta-rating">
      @if (!voteStatus()) {
        <h4>Schon probiert?</h4>
        <p class="cta-subtitle">Teile uns mit, wie es dir geschmeckt hat!</p>
      } @else {
        <h4>Vielen Dank für dein Feedback!</h4>
      }
    </div>

    <div class="vote-buttons">
      <button
        matIconButton
        class="vote-button vote-up"
        (click)="onClickVote('upvote')"
        [disabled]="voteStatus()"
        [class.voted]="voteStatus() === 'upvote'"
        aria-label="Dieses Rezept positiv bewerten"
      >
        <mat-icon>thumb_up</mat-icon>
      </button>
      <button
        matIconButton
        class="vote-button vote-down"
        (click)="onClickVote('downvote')"
        [disabled]="voteStatus()"
        [class.voted]="voteStatus() === 'downvote'"
        aria-label="Dieses Rezept negativ bewerten"
      >
        <mat-icon>thumb_down</mat-icon>
      </button>
    </div>
  </div>

  @if (canUseFavorites()) {
    <button
      matIconButton
      class="favorite-button"
      [class.active]="isCurrentRecipeFavorite()"
      (click)="onClickToggleFavorite()"
      [disabled]="isFavoritesBusy()"
      [matTooltip]="isCurrentRecipeFavorite() ? 'Aus Favoriten entfernen' : 'Als Favorit speichern'"
      matTooltipPosition="above"
      [attr.aria-label]="
        isCurrentRecipeFavorite()
          ? 'Rezept aus Favoriten entfernen'
          : 'Rezept als Favorit speichern'
      "
    >
      <mat-icon>{{ isCurrentRecipeFavorite() ? 'favorite' : 'favorite_border' }}</mat-icon>
    </button>
  }

  <button
    matIconButton
    [cdkCopyToClipboard]="shareUrl()"
    (click)="openSnackBar()"
    matTooltip="Link in die Zwischenablage kopieren"
    matTooltipPosition="above"
    aria-label="In Zwischenablage kopieren"
  >
    <mat-icon>add_link</mat-icon>
  </button>
</div>

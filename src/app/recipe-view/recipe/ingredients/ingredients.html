<section class="ingredients-section">
  <h4 class="section-heading">Zutaten</h4>
  @for (division of ingredientDivisions(); track $index) {
    <div [class.ingredient-division]="!isOnlyDivision()">
      @if (!isOnlyDivision()) {
        <h5 class="division-heading">{{ division.title }}</h5>
      }
      <ul class="ingredient-list">
        @for (item of division.items; track $index) {
          <li class="ingredient">{{ item }}</li>
        }
      </ul>
    </div>
  }
</section>

<mat-card class="selection-card" appearance="raised">
  <mat-card-header>
    <mat-card-title class="selection-card-title">Preferred Preparation Time</mat-card-title>
  </mat-card-header>

  <mat-card-content class="selection-buttons">
    <div class="selection-option">
      <button matFab extended (click)="onClickButton('quick')">
        <mat-icon>bolt</mat-icon>
        Quick
      </button>
      <span class="option-subtitle">Ready before your coffee cools</span>
    </div>

    <div class="selection-option">
      <button matFab extended (click)="onClickButton('ordinary')">
        <mat-icon>restaurant</mat-icon>
        Ordinary
      </button>
      <span class="option-subtitle">A meal worth the wait</span>
    </div>

    <div class="selection-option">
      <button matFab extended (click)="onClickButton('complex')">
        <mat-icon>menu_book</mat-icon>
        Complex
      </button>
      <span class="option-subtitle">For those who love the craft</span>
    </div>
  </mat-card-content>
</mat-card>

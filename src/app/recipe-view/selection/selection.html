<mat-card class="selection-card" appearance="raised">
  <mat-card-header>
    <mat-card-title class="selection-card-title">Wie schnell soll's gehen?</mat-card-title>
  </mat-card-header>

  <mat-card-content class="selection-buttons">
    <div class="selection-option">
      <button matFab extended (click)="onClickButton('quick')">
        <mat-icon>bolt</mat-icon>
        Schnell
      </button>
      <span class="option-subtitle">Fertig, bevor dein Kaffee kalt ist</span>
    </div>

    <div class="selection-option">
      <button matFab extended (click)="onClickButton('ordinary')">
        <mat-icon>restaurant</mat-icon>
        Standard
      </button>
      <span class="option-subtitle">Ist das Warten wert</span>
    </div>

    <div class="selection-option">
      <button matFab extended (click)="onClickButton('complex')">
        <mat-icon>menu_book</mat-icon>
        Aufwendig
      </button>
      <span class="option-subtitle">Für alle, die gerne kochen</span>
    </div>
  </mat-card-content>
</mat-card>

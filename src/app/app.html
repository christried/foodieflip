<div class="app-container">
  <app-header />

  <main class="main-content">
    <router-outlet />
  </main>

  <app-footer [title]="title()" [version]="version()" />
</div>

@if (canSubmitRecipe()) {
  <button
    class="submit-fab"
    matFab
    type="button"
    aria-label="Neues Rezept einreichen"
    matTooltip="Neues Rezept einreichen"
    (click)="openSubmitDialog()"
  >
    <mat-icon>add</mat-icon>
  </button>
}

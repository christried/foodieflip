name: Notify Discord on Changelog Update

on:
  push:
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch: # Ermöglicht den manuellen Start über den "Actions" Tab

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract and Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CHANGELOG_UPDATES }}
        run: |
          Extrahiere den Inhalt (Ab dem ersten ## bis zum dritten ##)
          CHANGELOG_CONTENT=$(awk '/^## / { count++ } count > 2 { exit } count >= 1 { print }' CHANGELOG.md)
          
          Discord Limit Sicherheit
          CHANGELOG_TRIMMED=$(echo "$CHANGELOG_CONTENT" | head -c 2000)

          Baue das JSON-Payload mit jq zusammen (behandelt alle Sonderzeichen/Quotes)
          PAYLOAD=$(jq -n \
            --arg desc "$CHANGELOG_TRIMMED" \
            --arg repo "${{ github.repository }}" \
            --arg ts "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            '{
              content: "📢 **Neuer Eintrag im Changelog zu Foodie Flip!**",
              embeds: [{
                title: "📄 CHANGELOG.md ansehen",
                url: "https://github.com/\($repo)/blob/main/CHANGELOG.md",
                description: $desc,
                color: 8992538,
                timestamp: $ts,
                footer: {
                  text: "\($repo) • GitHub Actions",
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                author: {
                  name: "FoodieFlip Developer Updates",
                  icon_url: "https://cdn-icons-png.flaticon.com/512/1082/1082440.png"
                }
              }]
            }')
         
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"

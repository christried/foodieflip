name: Notify Discord on Changelog Update

on:
  push:
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract and Send to Discord
        shell: python
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CHANGELOG_UPDATES }}
          REPO_NAME: ${{ github.repository }}
        run: |
          import os
          import json
          import urllib.request
          from datetime import datetime

          
          with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
              lines = f.readlines()

          
          content = []
          header_count = 0
          for line in lines:
              if line.startswith('## '):
                  header_count += 1
              if header_count > 2:
                  break
              if header_count >= 1:
                  content.append(line)
          
          full_text = "".join(content)[:2000] 

          
          payload = {
              "content": "📢 **Neuer Eintrag im Changelog zu Foodie Flip!**",
              "embeds": [{
                  "title": "📄 CHANGELOG.md ansehen",
                  "url": f"https://github.com/{os.environ['REPO_NAME']}/blob/master/CHANGELOG.md",
                  "description": full_text,
                  "color": 8992538,
                  "timestamp": datetime.utcnow().isoformat() + "Z",
                  "footer": {
                      "text": f"{os.environ['REPO_NAME']} • GitHub Actions",
                      "icon_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                  },
                  "author": {
                      "name": "FoodieFlip Developer Updates",
                      "icon_url": "https://cdn-icons-png.flaticon.com/512/1082/1082440.png"
                  }
              }]
          }

          
          req = urllib.request.Request(
              os.environ['DISCORD_WEBHOOK'],
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json', 'User-Agent': 'Mozilla/5.0'}
          )
          
          try:
              with urllib.request.urlopen(req) as response:
                  print(f"Status: {response.getcode()}")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
